version: 1.0
runtime: python3
build:
  commands:
    build:
      - echo "Build started on `date`"
      - echo "Building the Docker image..."
      - pip install pipenv
      - pipenv install
    post-build:
      - python manage.py test
  env:
    - name: DJANGO_SETTINGS_MODULE
      value: "django_apprunner.settings"
    - name: MY_VAR_EXAMPLE
      value: "example"
run:
  runtime-version: 3.8.20
  command: gunicorn --bind 0.0.0.0:8000 not_pointless.wsgi:application
  network:
    port: 8000
    env: PORT
  env:
    - name: ENVIRONMENT
      value: production
    - name: DEBUG
      value: "False"
    - name: ALLOWED_HOST
      value: "notpointless.ft1.us"
    - name: AWS_DEFAULT_REGION
      value: "us-east-1"
    # Note: SECRET_KEY is automatically handled by the application using AWS Secrets Manager
    # Other sensitive values should not be included in this file
