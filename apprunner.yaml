version: 1.0
runtime: python3
build:
  commands:
    build:
      - echo "Build started on `date`"    
      - pip install pipenv
      - pipenv install
      - echo "Installing Python dependencies..."
      - pip install -r requirements.txt
      - echo "Collecting static files..."
      - pipenv run python manage.py collectstatic --noinput

run:  
  command: pipenv run gunicorn --bind 0.0.0.0:8000 not_pointless.wsgi:application
  network:
    port: 8000
    env: PORT
  env:
    - name: ENVIRONMENT
      value: production
    - name: DEBUG
      value: "False"
    - name: ALLOWED_HOST
      value: "notpointless.ft1.us"
    - name: AWS_DEFAULT_REGION
      value: "us-east-1"
    # Note: SECRET_KEY is automatically handled by the application using AWS Secrets Manager
    # Other sensitive values should not be included in this file
